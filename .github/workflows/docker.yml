name: Docker

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Manual image tag, for example v1.0.0"
        required: false
        default: latest

run-name: Publish Docker image (${{ github.event.release.tag_name || inputs.image_tag || github.ref_name }})

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/mfrimannm/unf-quiz

jobs:
  build-and-push:
    name: Build and publish image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.event.release.tag_name || inputs.image_tag }},enable=${{ github.event_name == 'release' || inputs.image_tag != 'latest' }}
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
