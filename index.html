<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
		/>
		<meta name="theme-color" content="#191919" />

		<title>Jeopardy</title>

		<link rel="stylesheet" href="dist/reset.css" />
		<link rel="stylesheet" href="dist/reveal.css" />
		<link rel="stylesheet" href="dist/theme/black.css" />
		<link rel="stylesheet" href="dist/plugin/highlight/monokai.css" />

		<link rel="stylesheet" href="static/styles/app.css" />
		<link rel="stylesheet" href="static/styles/board.css" />
		<link rel="stylesheet" href="static/styles/question-maker.css" />
		<link rel="stylesheet" href="static/styles/mobile.css" />
	</head>

	<body>
		<div class="reveal">
			<div class="slides" id="slides">
				<section id="home" class="home-slide">
					<h1>Jeopardy Games</h1>

					<div class="home-layout">
						<div class="home-panel">
							<h2>Game filer</h2>
							<label for="game-select">Vælg game</label>
							<select id="game-select"></select>
							<div class="game-list" id="game-list"></div>
							<div class="game-meta" id="game-meta"></div>
						</div>

						<div class="home-panel">
							<h2>Settings</h2>
							<label for="team-count">Antal teams</label>
							<input id="team-count" type="number" min="1" max="6" step="1" />

							<div class="team-field-list" id="team-field-list"></div>

							<p class="settings-note">
								Team settings gemmes per game i denne browser.
							</p>

							<div class="home-actions">
								<button class="game-button primary" type="button" onclick="startConfiguredGame()">
									Start game
								</button>
								<button class="game-button secondary" type="button" onclick="saveSettingsAndReload('/home')">
									Gem settings
								</button>
								<button class="game-button secondary" id="question-maker-toggle" type="button" onclick="toggleQuestionMaker()">
									Question maker
								</button>
								<button class="game-button reset" type="button" onclick="resetGameSettings()">
									Reset settings
								</button>
							</div>

							<div class="question-maker" id="question-maker" hidden>
								<div class="question-maker-header">
									<h2>Question maker</h2>
									<button class="game-button secondary" type="button" onclick="toggleQuestionMaker(false)">
										Luk
									</button>
								</div>
								<div class="builder-stage builder-setup">
									<div class="admin-panel">
										<div>
											<label for="admin-password">Admin kode</label>
											<input id="admin-password" type="password" autocomplete="current-password" />
										</div>
										<button class="game-button secondary" id="admin-login-button" type="button" onclick="loginAdmin()">
											Log ind
										</button>
										<button class="game-button reset" id="admin-logout-button" type="button" onclick="logoutAdmin()" hidden>
											Log ud
										</button>
									</div>
									<div class="admin-status" id="admin-status"></div>
								</div>
								<div class="builder-stage builder-setup" id="builder-setup">
									<div class="builder-grid">
										<div>
											<label for="builder-title">Game titel</label>
											<input id="builder-title" type="text" autocomplete="off" />
										</div>
										<div>
											<label for="builder-id">Game id / filnavn</label>
											<input id="builder-id" type="text" autocomplete="off" />
										</div>
										<div>
											<label for="builder-category-count">Antal kategorier</label>
											<input id="builder-category-count" type="number" min="1" max="10" step="1" />
										</div>
										<div>
											<label for="builder-row-count">Antal rækker</label>
											<input id="builder-row-count" type="number" min="1" max="10" step="1" />
										</div>
									</div>

									<label for="builder-teams">Teams, en per linje</label>
									<textarea id="builder-teams"></textarea>

									<div class="home-actions">
										<button class="game-button primary" type="button" onclick="buildQuestionMakerBoard()">
											Lav board
										</button>
										<button class="game-button secondary" type="button" onclick="loadCurrentGameIntoBuilder()">
											Hent valgt game
										</button>
										<button class="game-button reset" type="button" onclick="resetBuilderDraft()">
											Reset kladde
										</button>
									</div>
								</div>

								<div class="builder-stage" id="builder-board-stage" hidden>
									<div class="builder-board-wrap">
										<div class="builder-board" id="builder-board"></div>
									</div>

									<div class="builder-editor" id="builder-editor" hidden>
										<h3 id="builder-editor-title">Spørgsmål</h3>
										<div class="builder-editor-top">
											<div>
												<label for="builder-question-points">Point</label>
												<input id="builder-question-points" type="number" min="0" step="100" />
											</div>
										</div>

										<div class="builder-content-grid">
											<div class="builder-content-panel">
												<div>
													<label for="builder-question-type">Spørgsmålstype</label>
													<select id="builder-question-type">
														<option value="question">Tekst</option>
														<option value="markdown">Markdown</option>
														<option value="html">HTML</option>
													</select>
												</div>

												<label for="builder-question-text">Spørgsmål</label>
												<div class="builder-helper-row" aria-label="Hjælp til spørgsmål">
													<button class="game-button secondary" type="button" onclick="insertBuilderSnippet('question', 'youtube')">YouTube</button>
													<button class="game-button secondary" type="button" onclick="insertBuilderSnippet('question', 'video')">Video</button>
													<button class="game-button secondary" type="button" onclick="insertBuilderSnippet('question', 'audio')">Lyd</button>
													<button class="game-button secondary" type="button" onclick="insertBuilderSnippet('question', 'image')">Billede</button>
													<button class="game-button secondary" type="button" onclick="insertBuilderSnippet('question', 'math')">Math</button>
												</div>
												<textarea id="builder-question-text"></textarea>

												<div class="builder-upload-row">
													<div>
														<label for="builder-image-upload">Upload billede til spørgsmål</label>
														<input id="builder-image-upload" type="file" accept="image/png,image/jpeg,image/webp,image/gif" />
													</div>
													<button class="game-button secondary" id="builder-upload-button" type="button" onclick="uploadBuilderImage()">
														Upload
													</button>
												</div>
											</div>

											<div class="builder-content-panel">
												<div>
													<label for="builder-answer-type">Svartype</label>
													<select id="builder-answer-type">
														<option value="answer">Tekst</option>
														<option value="answerMarkdown">Markdown</option>
														<option value="answerHtml">HTML</option>
													</select>
												</div>

												<label for="builder-answer-text">Svar</label>
												<div class="builder-helper-row" aria-label="Hjælp til svar">
													<button class="game-button secondary" type="button" onclick="insertBuilderSnippet('answer', 'youtube')">YouTube</button>
													<button class="game-button secondary" type="button" onclick="insertBuilderSnippet('answer', 'video')">Video</button>
													<button class="game-button secondary" type="button" onclick="insertBuilderSnippet('answer', 'audio')">Lyd</button>
													<button class="game-button secondary" type="button" onclick="insertBuilderSnippet('answer', 'image')">Billede</button>
													<button class="game-button secondary" type="button" onclick="insertBuilderSnippet('answer', 'math')">Math</button>
												</div>
												<textarea id="builder-answer-text"></textarea>
											</div>
										</div>

										<div class="builder-slide-settings">
											<h4>Slide settings</h4>
											<div>
												<label for="builder-background">Baggrundsbillede / farve</label>
												<input id="builder-background" type="text" placeholder="/uploads/billede.webp eller #000000" />
											</div>
											<div>
												<label for="builder-background-color">Baggrundsfarve</label>
												<input id="builder-background-color" type="text" placeholder="#000000" />
											</div>
											<div>
												<label for="builder-background-video">Baggrundsvideo</label>
												<input id="builder-background-video" type="text" placeholder="examples/assets/video.mp4" />
											</div>
											<div>
												<label for="builder-background-iframe">Baggrund YouTube / iframe</label>
												<input id="builder-background-iframe" type="text" placeholder="https://www.youtube.com/watch?v=..." />
											</div>
											<div>
												<label for="builder-transition">Transition</label>
												<select id="builder-transition">
													<option value="">Standard</option>
													<option value="slide">Slide</option>
													<option value="fade">Fade</option>
													<option value="zoom">Zoom</option>
													<option value="convex">Convex</option>
													<option value="concave">Concave</option>
												</select>
											</div>
											<div>
												<label for="builder-class-name">CSS class</label>
												<input id="builder-class-name" type="text" placeholder="r-fit-text" />
											</div>
											<div class="builder-checkbox">
												<input id="builder-background-interactive" type="checkbox" />
												<label for="builder-background-interactive">Interaktiv baggrund</label>
											</div>
											<div class="builder-checkbox">
												<input id="builder-background-video-loop" type="checkbox" checked />
												<label for="builder-background-video-loop">Loop baggrundsvideo</label>
											</div>
											<div class="builder-checkbox">
												<input id="builder-background-video-muted" type="checkbox" checked />
												<label for="builder-background-video-muted">Mute baggrundsvideo</label>
											</div>
										</div>

										<details class="builder-extra">
											<summary>Andet</summary>
											<div class="builder-extra-fields">
												<label for="builder-hints-text">Hints, en per linje</label>
												<textarea id="builder-hints-text"></textarea>

												<label for="builder-notes-text">Speaker notes</label>
												<textarea id="builder-notes-text"></textarea>
											</div>
										</details>
									</div>

									<div class="home-actions">
										<button class="game-button secondary" type="button" onclick="editQuestionMakerSetup()">
											Rediger setup
										</button>
										<button class="game-button secondary" type="button" onclick="saveBuilderDraft()">
											Gem kladde
										</button>
										<button class="game-button primary" id="builder-save-game-button" type="button" onclick="saveBuilderFile()">
											Gem spil
										</button>
										<button class="game-button secondary" type="button" onclick="copyBuilderRegistration()" hidden>
											Kopier JSON-filnavn
										</button>
									</div>

									<label for="builder-output">Preview af game JSON</label>
									<textarea class="builder-output" id="builder-output" readonly></textarea>
								</div>
								<div class="builder-status" id="builder-status"></div>
							</div>
						</div>
					</div>
				</section>

				<section id="board" class="board-slide">
					<div class="board-header">
						<h1 id="game-title">Jeopardy</h1>
						<div class="scoreboard" id="scoreboard" aria-label="Scoreboard"></div>
					</div>

					<div class="board-wrap">
						<div class="category-row" id="category-row"></div>
						<div class="jeopardy-board" id="jeopardy-board"></div>
					</div>

					<div class="board-actions">
						<div class="game-name" id="game-name"></div>
						<div class="home-actions">
							<button class="game-button secondary" type="button" onclick="goToHome()">
								Settings
							</button>
							<button class="game-button reset" type="button" onclick="resetGame()">
								Reset game
							</button>
						</div>
					</div>
				</section>
			</div>
		</div>

		<script src="dist/reveal.js"></script>
		<script src="dist/plugin/notes.js"></script>
		<script src="dist/plugin/markdown.js"></script>
		<script src="dist/plugin/highlight.js"></script>
		<script src="dist/plugin/math.js"></script>
		<script src="dist/plugin/search.js"></script>
		<script src="dist/plugin/zoom.js"></script>

		<script src="static/app/state.js"></script>
		<script src="static/app/api.js"></script>
		<script src="static/app/storage.js"></script>
		<script src="static/app/game-model.js"></script>
		<script src="static/app/media.js"></script>
		<script src="static/app/question-maker.js"></script>
		<script src="static/app/renderer.js"></script>
		<script src="static/app/scoring.js"></script>
		<script src="static/app/main.js"></script>
	</body>
</html>
