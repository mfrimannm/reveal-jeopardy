<!DOCTYPE html>
<html lang="en" style="background: #191919; color: #ffffff;">
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
		/>
		<meta name="theme-color" content="#191919" />

		<title>Jeopardy</title>

		<link rel="stylesheet" href="dist/reset.css" />
		<link rel="stylesheet" href="dist/reveal.css" />
		<link rel="stylesheet" href="dist/theme/black.css" />
		<link rel="stylesheet" href="dist/plugin/highlight/monokai.css" />

		<style>
			:root {
				--jeopardy-blue: #071fc2;
				--jeopardy-blue-dark: #02106e;
				--jeopardy-gold: #ffd348;
				--jeopardy-line: #ffffff;
				--jeopardy-red: #c92f2f;
				--jeopardy-green: #188f54;
				--category-count: 6;
				--question-count: 6;
				--team-count: 3;
				color-scheme: dark;
			}

			html,
			body,
			.reveal-viewport,
			.reveal,
			.reveal .backgrounds {
				background: #191919;
				background-color: #191919;
				color: #ffffff;
			}

			.reveal .slides section {
				box-sizing: border-box;
			}

			.reveal h1,
			.reveal h2,
			.reveal h3,
			.reveal p {
				margin-left: 0;
				margin-right: 0;
			}

			.home-slide {
				text-align: left;
			}

			.home-slide h1 {
				color: var(--jeopardy-gold);
				font-size: clamp(0.78em, 4vw, 1.15em);
				line-height: 1;
				margin: 0 0 18px;
				text-transform: uppercase;
			}

			.home-layout {
				display: grid;
				grid-template-columns: minmax(0, 1.05fr) minmax(300px, 0.95fr);
				gap: 18px;
				height: calc(100% - 78px);
				min-height: 0;
			}

			.home-panel {
				border: 2px solid rgba(255, 255, 255, 0.74);
				background: rgba(255, 255, 255, 0.06);
				padding: 18px;
				min-height: 0;
				overflow: auto;
			}

			.home-panel h2 {
				color: #ffffff;
				font-size: 0.5em;
				line-height: 1.05;
				margin: 0 0 14px;
			}

			.home-panel label,
			.home-panel legend,
			.question-maker label,
			.question-maker legend {
				color: #dddddd;
				display: block;
				font-size: 0.32em;
				font-weight: 800;
				line-height: 1.2;
				margin-bottom: 8px;
				text-transform: uppercase;
			}

			.home-panel select,
			.home-panel input,
			.home-panel textarea,
			.question-maker select,
			.question-maker input,
			.question-maker textarea {
				border: 2px solid rgba(255, 255, 255, 0.85);
				background: #111111;
				box-sizing: border-box;
				color: #ffffff;
				font: inherit;
				font-size: 0.34em;
				line-height: 1.15;
				margin-bottom: 12px;
				padding: 10px 12px;
				width: 100%;
			}

			.home-panel textarea,
			.question-maker textarea {
				min-height: 72px;
				resize: vertical;
			}

			.game-list {
				display: grid;
				gap: 10px;
				margin: 14px 0;
			}

			.game-card {
				border: 2px solid rgba(255, 255, 255, 0.7);
				color: #ffffff;
				display: block;
				padding: 12px;
				text-decoration: none;
			}

			.game-card.active {
				border-color: var(--jeopardy-gold);
				background: rgba(255, 211, 72, 0.12);
			}

			.game-card strong,
			.game-card span {
				display: block;
			}

			.game-card strong {
				color: var(--jeopardy-gold);
				font-size: 0.36em;
				line-height: 1.15;
				text-transform: uppercase;
			}

			.game-card span,
			.game-meta,
			.settings-note {
				color: #d8d8d8;
				font-size: 0.28em;
				line-height: 1.28;
			}

			.game-meta {
				display: grid;
				gap: 8px;
				margin-top: 14px;
			}

			.team-field-list {
				display: grid;
				gap: 8px;
				margin-bottom: 14px;
			}

			.team-field-list label {
				margin-bottom: 4px;
				text-transform: none;
			}

			.home-actions {
				display: flex;
				flex-wrap: wrap;
				gap: 10px;
				margin-top: 12px;
			}

			.home-actions .game-button {
				font-size: 0.31em;
			}

			.question-maker {
				background: #191919;
				border: 2px solid rgba(255, 255, 255, 0.78);
				box-shadow: 0 16px 48px rgba(0, 0, 0, 0.72);
				box-sizing: border-box;
				color: #ffffff;
				display: grid;
				gap: 12px;
				left: 50%;
				max-height: calc(100vh - 28px);
				overflow: auto;
				padding: 18px;
				position: fixed;
				top: 14px;
				transform: translateX(-50%);
				width: min(1120px, calc(100vw - 28px));
				z-index: 9999;
			}

			.question-maker[hidden] {
				display: none;
			}

			.question-maker-header {
				align-items: center;
				display: flex;
				gap: 12px;
				justify-content: space-between;
			}

			.question-maker-header h2 {
				color: var(--jeopardy-gold);
				font-size: 24px;
				line-height: 1.05;
				margin: 0;
				text-transform: uppercase;
			}

			.question-maker label,
			.question-maker legend {
				font-size: 13px;
			}

			.question-maker select,
			.question-maker input,
			.question-maker textarea {
				font-size: 16px;
			}

			.question-maker .game-button {
				font-size: 14px;
				padding: 10px 14px;
			}

			.builder-grid {
				display: grid;
				grid-template-columns: repeat(2, minmax(0, 1fr));
				gap: 10px;
			}

			.builder-setup {
				border: 2px solid rgba(255, 255, 255, 0.62);
				background: rgba(0, 0, 0, 0.24);
				padding: 12px;
			}

			.builder-stage {
				display: grid;
				gap: 12px;
			}

			.builder-stage[hidden] {
				display: none;
			}

			.builder-board-wrap {
				overflow: auto;
			}

			.builder-board {
				display: grid;
				gap: 7px;
				min-width: 520px;
			}

			.builder-category-title,
			.builder-tile {
				border: 2px solid var(--jeopardy-line);
				box-sizing: border-box;
				min-height: 58px;
			}

			.builder-category-title {
				background: var(--jeopardy-blue-dark);
				color: #ffffff;
				font-size: 14px;
				font-weight: 800;
				line-height: 1.12;
				margin: 0;
				text-align: center;
				text-transform: uppercase;
			}

			.builder-tile {
				background: var(--jeopardy-blue);
				color: var(--jeopardy-gold);
				cursor: pointer;
				font-size: 22px;
				font-weight: 900;
				line-height: 1;
				padding: 8px;
			}

			.builder-tile:hover,
			.builder-tile:focus,
			.builder-tile.active {
				background: #0a2aee;
				transform: translateY(-1px);
			}

			.builder-tile.complete {
				background: #164f38;
			}

			.builder-tile span {
				color: #ffffff;
				display: block;
				font-size: 12px;
				line-height: 1.15;
				margin-top: 6px;
			}

			.builder-editor {
				border: 2px solid rgba(255, 255, 255, 0.62);
				background: rgba(0, 0, 0, 0.24);
				display: grid;
				gap: 10px;
				padding: 12px;
			}

			.builder-editor[hidden] {
				display: none;
			}

			.builder-editor h3 {
				color: var(--jeopardy-gold);
				font-size: 18px;
				line-height: 1.1;
				margin: 0;
				text-transform: uppercase;
			}

			.builder-extra {
				border: 2px solid rgba(255, 255, 255, 0.36);
				padding: 10px;
			}

			.builder-extra summary {
				cursor: pointer;
				font-size: 14px;
				font-weight: 800;
				line-height: 1.2;
				text-transform: uppercase;
			}

			.builder-extra-fields {
				display: grid;
				gap: 10px;
				margin-top: 10px;
			}

			.builder-output {
				font-family: Consolas, Monaco, monospace;
				font-size: 13px;
				min-height: 160px;
				white-space: pre;
			}

			.builder-status {
				color: var(--jeopardy-gold);
				font-size: 14px;
				line-height: 1.25;
				min-height: 1.25em;
			}

			.builder-small-button {
				flex: 0 0 auto;
				padding: 8px 10px;
			}

			.board-slide {
				display: flex !important;
				flex-direction: column;
				gap: 8px;
				width: 100%;
				height: 100%;
				overflow: hidden;
			}

			.board-header {
				display: flex;
				align-items: flex-start;
				justify-content: space-between;
				gap: 18px;
				margin-bottom: 4px;
			}

			.board-header h1 {
				margin: 0;
				color: var(--jeopardy-gold);
				flex: 1 1 auto;
				font-size: clamp(0.58em, 3.6vw, 0.95em);
				letter-spacing: 0;
				line-height: 1.02;
				max-width: 58%;
				text-transform: uppercase;
			}

			.scoreboard {
				display: grid;
				grid-template-columns: repeat(var(--team-count), minmax(92px, 1fr));
				gap: 8px;
				width: min(48%, 620px);
				font-size: 0.38em;
			}

			.score-card {
				border: 2px solid var(--jeopardy-line);
				background: #111111;
				padding: 8px 10px;
				text-align: center;
			}

			.score-card strong {
				display: block;
				color: #ffffff;
				font-size: 0.9em;
				line-height: 1.1;
			}

			.score-card span {
				display: block;
				color: var(--jeopardy-gold);
				font-size: 1.35em;
				font-weight: 800;
				line-height: 1.1;
				margin-top: 4px;
			}

			.board-wrap {
				display: flex;
				flex-direction: column;
				gap: 7px;
				flex: 1 1 auto;
				min-height: 0;
			}

			.category-row,
			.jeopardy-board {
				display: grid;
				grid-template-columns: repeat(var(--category-count), minmax(0, 1fr));
				gap: 7px;
				width: 100%;
			}

			.jeopardy-board {
				flex: 1 1 auto;
				min-height: 0;
				grid-template-rows: repeat(var(--question-count), minmax(0, 1fr));
			}

			.category,
			.points {
				border: 3px solid var(--jeopardy-line);
				background: var(--jeopardy-blue);
				color: #ffffff;
				font-weight: 800;
				text-align: center;
				text-transform: uppercase;
				box-sizing: border-box;
			}

			.category {
				min-height: 48px;
				padding: 8px 6px;
				display: flex;
				align-items: center;
				justify-content: center;
				background: var(--jeopardy-blue-dark);
				font-size: 0.34em;
				line-height: 1.12;
			}

			.points {
				min-height: 0;
				padding: 0;
				transition: opacity 160ms ease, transform 160ms ease;
			}

			.points a {
				width: 100%;
				height: 100%;
				min-height: 0;
				display: flex;
				align-items: center;
				justify-content: center;
				color: var(--jeopardy-gold);
				font-size: 0.58em;
				font-weight: 900;
				line-height: 1;
				text-decoration: none;
			}

			.points:not(.used):hover,
			.points:not(.used):focus-within {
				transform: translateY(-2px);
				background: #0a2aee;
			}

			.points.used {
				background: #171717;
				border-color: #777777;
				opacity: 0.72;
			}

			.points.used a {
				color: #bdbdbd;
				font-size: 0.38em;
				letter-spacing: 0;
			}

			.points.used:hover,
			.points.used:focus-within {
				transform: translateY(-2px);
				background: #292929;
			}

			.board-actions {
				margin-top: 4px;
				display: flex;
				align-items: center;
				justify-content: space-between;
				gap: 12px;
				flex: 0 0 auto;
			}

			.game-name {
				color: #cfcfcf;
				font-size: 0.3em;
				line-height: 1.2;
				min-width: 0;
				overflow: hidden;
				text-overflow: ellipsis;
				white-space: nowrap;
			}

			.game-button {
				border: 2px solid #ffffff;
				background: #161616;
				color: #ffffff;
				padding: 10px 16px;
				font-size: 0.35em;
				font-weight: 800;
				line-height: 1;
				cursor: pointer;
			}

			.game-button:hover,
			.game-button:focus {
				background: #2a2a2a;
			}

			.game-button.primary {
				background: var(--jeopardy-blue);
				color: var(--jeopardy-gold);
			}

			.game-button.correct {
				background: var(--jeopardy-green);
			}

			.game-button.wrong {
				background: var(--jeopardy-red);
			}

			.game-button.reset {
				background: #3a1111;
				flex: 0 0 auto;
				white-space: nowrap;
			}

			.game-button.secondary {
				background: #222222;
			}

			.question-slide {
				display: flex !important;
				flex-direction: column;
				height: 100%;
				overflow: hidden;
				text-align: left;
			}

			.question-slide h2 {
				flex: 0 0 auto;
				margin: 0 0 12px;
				color: var(--jeopardy-gold);
				font-size: clamp(0.5em, 3vw, 0.78em);
				line-height: 1.08;
				text-transform: uppercase;
			}

			.question-layout {
				display: grid;
				grid-template-columns: minmax(0, 1fr) minmax(230px, 300px);
				gap: 18px;
				flex: 1 1 auto;
				min-height: 0;
			}

			.question-main,
			.question-sidebar {
				min-height: 0;
			}

			.question-main {
				overflow: auto;
				padding-right: 4px;
			}

			.question-sidebar {
				border: 2px solid rgba(255, 255, 255, 0.74);
				background: rgba(0, 0, 0, 0.58);
				display: flex;
				flex-direction: column;
				gap: 10px;
				overflow: hidden;
				padding: 12px;
			}

			.question-points {
				border: 2px solid var(--jeopardy-gold);
				color: var(--jeopardy-gold);
				font-size: 0.66em;
				font-weight: 900;
				line-height: 1;
				padding: 12px;
				text-align: center;
			}

			.question-text {
				font-size: clamp(0.44em, 2.2vw, 0.62em);
				line-height: 1.25;
				margin-bottom: 14px;
			}

			.question-text p,
			.question-text ul,
			.question-text ol,
			.question-text table,
			.answer p,
			.answer ul,
			.answer ol,
			.answer table {
				margin-bottom: 0.6em;
			}

			.question-text img,
			.answer img {
				max-height: 42vh;
				max-width: 100%;
				object-fit: contain;
			}

			.question-text video,
			.question-text iframe,
			.answer video,
			.answer iframe {
				aspect-ratio: 16 / 9;
				background: #000000;
				border: 0;
				display: block;
				max-height: min(42vh, 420px);
				max-width: 100%;
				width: min(100%, 680px);
			}

			.question-text pre,
			.answer pre {
				font-size: 0.54em;
				line-height: 1.18;
				margin: 0.8em 0;
			}

			.question-text table,
			.answer table {
				font-size: 0.75em;
				width: 100%;
			}

			.question-text .media-row {
				align-items: center;
				display: flex;
				flex-wrap: wrap;
				gap: 22px;
			}

			.question-text .pokemon-sprite {
				image-rendering: pixelated;
				width: min(32vw, 220px);
			}

			.question-text .feature-label {
				color: var(--jeopardy-gold);
				font-size: 0.58em;
				font-weight: 800;
				letter-spacing: 0;
				margin-bottom: 0.45em;
				text-transform: uppercase;
			}

			.question-hints {
				margin-top: 0.9em;
			}

			.hint-cue {
				color: #ffffff;
				font-size: 0.72em;
				font-weight: 700;
				margin-bottom: 0.45em;
				opacity: 0.82;
			}

			.question-hints p {
				color: var(--jeopardy-gold);
				font-weight: 800;
			}

			.answer {
				display: none;
				border-left: 8px solid var(--jeopardy-gold);
				background: rgba(0, 0, 0, 0.9);
				box-shadow: 0 8px 28px rgba(0, 0, 0, 0.5);
				color: #ffffff;
				font-size: clamp(0.38em, 1.9vw, 0.52em);
				line-height: 1.22;
				margin: 12px 0 0;
				padding: 14px 18px;
				text-shadow: 0 1px 2px rgba(0, 0, 0, 0.9);
			}

			.answer.visible {
				display: block;
			}

			.question-actions {
				display: flex;
				flex: 0 0 auto;
				gap: 12px;
				margin: 10px 0 0;
			}

			.score-controls {
				display: grid;
				gap: 8px;
				min-height: 0;
				overflow: auto;
			}

			.team-score-row {
				display: grid;
				grid-template-columns: minmax(0, 1fr) 58px 58px;
				align-items: center;
				gap: 8px;
				border: 2px solid rgba(255, 255, 255, 0.8);
				background: rgba(255, 255, 255, 0.06);
				padding: 7px;
			}

			.team-score-row strong {
				color: #ffffff;
				font-size: 0.27em;
				line-height: 1.1;
				overflow: hidden;
				text-overflow: ellipsis;
				white-space: normal;
			}

			.team-score-row .game-button {
				min-width: 0;
				padding: 9px 8px;
				width: 100%;
				font-size: 0.28em;
			}

			@media (max-width: 900px) {
				.home-layout {
					grid-template-columns: 1fr;
					height: auto;
				}

				.board-header {
					align-items: stretch;
					flex-direction: column;
				}

				.board-header h1 {
					max-width: none;
				}

				.scoreboard {
					width: 100%;
				}

				.category,
				.points a {
					font-size: 0.28em;
				}

				.score-controls {
					overflow: visible;
				}

				.question-slide {
					overflow: auto;
				}

				.question-layout {
					grid-template-columns: 1fr;
					overflow: visible;
				}

				.question-main {
					overflow: visible;
				}

				.question-sidebar {
					overflow: visible;
				}

				.team-score-row {
					grid-template-columns: minmax(0, 1fr) 64px 64px;
				}

				.team-score-row strong {
					grid-column: auto;
				}

				.builder-grid {
					grid-template-columns: 1fr;
				}
			}
		</style>
	</head>

	<body style="background: #191919; color: #ffffff;">
		<div class="reveal">
			<div class="slides" id="slides">
				<section id="home" class="home-slide">
					<h1>Jeopardy Games</h1>

					<div class="home-layout">
						<div class="home-panel">
							<h2>Game filer</h2>
							<label for="game-select">Vælg game</label>
							<select id="game-select"></select>
							<div class="game-list" id="game-list"></div>
							<div class="game-meta" id="game-meta"></div>
						</div>

						<div class="home-panel">
							<h2>Settings</h2>
							<label for="team-count">Antal teams</label>
							<input id="team-count" type="number" min="1" max="6" step="1" />

							<div class="team-field-list" id="team-field-list"></div>

							<p class="settings-note">
								Team settings gemmes per game i denne browser.
							</p>

							<div class="home-actions">
								<button class="game-button primary" type="button" onclick="startConfiguredGame()">
									Start game
								</button>
								<button class="game-button secondary" type="button" onclick="saveSettingsAndReload('/home')">
									Gem settings
								</button>
								<button class="game-button secondary" id="question-maker-toggle" type="button" onclick="toggleQuestionMaker()">
									Question maker
								</button>
								<button class="game-button reset" type="button" onclick="resetGameSettings()">
									Reset settings
								</button>
							</div>

							<div class="question-maker" id="question-maker" hidden>
								<div class="question-maker-header">
									<h2>Question maker</h2>
									<button class="game-button secondary" type="button" onclick="toggleQuestionMaker(false)">
										Luk
									</button>
								</div>
								<div class="builder-stage builder-setup" id="builder-setup">
									<div class="builder-grid">
										<div>
											<label for="builder-title">Game titel</label>
											<input id="builder-title" type="text" autocomplete="off" />
										</div>
										<div>

		<script src="dist/reveal.js"></script>
		<script src="dist/plugin/notes.js"></script>
		<script src="dist/plugin/markdown.js"></script>
		<script src="dist/plugin/highlight.js"></script>
		<script src="dist/plugin/math.js"></script>
		<script src="dist/plugin/search.js"></script>
		<script src="dist/plugin/zoom.js"></script>

		<script>
			const GAME_FILES = {
				pokemon: "games/pokemon.js",
				science: "games/science.js",
				"mit-spil": "games/mit-spil.js",
			};
			const DEFAULT_GAME_KEY = "pokemon";
			const MIN_TEAM_COUNT = 1;
			const MAX_TEAM_COUNT = 6;
			const GAME_BUILDER_STORAGE_KEY = "reveal-jeopardy-builder-draft";

			let gameKey = DEFAULT_GAME_KEY;
			let gameConfig = null;
			let categories = [];
			let defaultTeamNames = [];
			let teamIds = [];
			let teams = [];
			let scores = {};
			let usedQuestions = [];
			let questionAwards = {};
			let questionIdSet = new Set();
			let gameBuilderDraft = null;
			let builderSelectedCategoryIndex = 0;
			let builderSelectedQuestionIndex = 0;
			let allowQuestionBoardNavigation = false;

			const KEY_CODE_TO_KEY = {
				37: "ArrowLeft",
				38: "ArrowUp",
				39: "ArrowRight",
				40: "ArrowDown",
			};

			function getStorageKey() {
				return "reveal-jeopardy-game:" + (gameConfig.id || gameKey);
			}

			function getSettingsStorageKey() {
				return "reveal-jeopardy-settings:" + gameKey;
			}

			function getRequestedGameKey() {
				const params = new URLSearchParams(window.location.search);
				const requestedGame = params.get("game") || DEFAULT_GAME_KEY;

				return GAME_FILES[requestedGame] ? requestedGame : DEFAULT_GAME_KEY;
			}

			function loadGameFile() {
				gameKey = getRequestedGameKey();

				return new Promise((resolve) => {
					const script = document.createElement("script");

					script.src = GAME_FILES[gameKey];
					script.onload = resolve;
					script.onerror = resolve;
					document.head.appendChild(script);
				});
			}

			function clampTeamCount(value) {
				const parsedValue = Number(value);

				if (Number.isNaN(parsedValue)) {
					return 3;
				}

				return Math.min(MAX_TEAM_COUNT, Math.max(MIN_TEAM_COUNT, parsedValue));
			}

			function readGameSettings() {
				try {
					const savedSettings = localStorage.getItem(getSettingsStorageKey());

					if (!savedSettings) {
						return {};
					}

					const parsedSettings = JSON.parse(savedSettings);

					return parsedSettings && typeof parsedSettings === "object"
						? parsedSettings
						: {};
				} catch (error) {
					console.warn("Could not load game settings.", error);
					return {};
				}
			}

			function getConfiguredTeamNames(baseTeamNames) {
				const fallbackNames =
					Array.isArray(baseTeamNames) && baseTeamNames.length
						? baseTeamNames
						: ["Team 1", "Team 2", "Team 3"];
				const settings = readGameSettings();
				const savedNames = Array.isArray(settings.teamNames)
					? settings.teamNames
					: [];
				const teamCount = clampTeamCount(
					settings.teamCount || savedNames.length || fallbackNames.length
				);

				return Array.from({ length: teamCount }, (_, index) => {
					const savedName = savedNames[index];
					const fallbackName = fallbackNames[index] || "Team " + (index + 1);
					const name =
						typeof savedName === "string" && savedName.trim()
							? savedName.trim()
							: fallbackName;

					return String(name || "Team " + (index + 1));
				});
			}

			function getTeamNamesFromForm() {
				const teamCountInput = document.getElementById("team-count");
				const teamCount = clampTeamCount(teamCountInput ? teamCountInput.value : 3);

				return Array.from({ length: teamCount }, (_, index) => {
					const input = document.getElementById("team-name-" + (index + 1));
					const value = input ? input.value.trim() : "";

					return value || "Team " + (index + 1);
				});
			}

			function writeGameSettings(teamNames) {
				try {
					localStorage.setItem(
						getSettingsStorageKey(),
						JSON.stringify({
							teamCount: teamNames.length,
							teamNames,
						})
					);
				} catch (error) {
					console.warn("Could not save game settings.", error);
				}
			}

			function saveSettingsAndReload(targetHash) {
				writeGameSettings(getTeamNamesFromForm());
				refreshGameFromSettings(targetHash || "/home");
			}

			function startConfiguredGame() {
				saveSettingsAndReload("/board");
			}

			function resetGameSettings() {
				try {
					localStorage.removeItem(getSettingsStorageKey());
				} catch (error) {
					console.warn("Could not reset game settings.", error);
				}

				refreshGameFromSettings("/home");
			}

			function clampBuilderCount(value, fallback) {
				const parsedValue = Number(value);

				if (Number.isNaN(parsedValue)) {
					return fallback;
				}

				return Math.min(10, Math.max(1, Math.floor(parsedValue)));
			}

			function createDefaultBuilderQuestion(points) {
				return {
					points,
					questionType: "question",
					question: "",
					answerType: "answer",
					answer: "",
					hints: "",
					notes: "",
				};
			}

			function createDefaultBuilderCategory(index, rowCount) {
				return {
					title: "Kategori " + index,
					questions: Array.from({ length: rowCount }, (_, questionIndex) =>
						createDefaultBuilderQuestion((questionIndex + 1) * 100)
					),
				};
			}

			function createDefaultBuilderDraft(categoryCount, rowCount) {
				const normalizedCategoryCount = clampBuilderCount(categoryCount, 3);
				const normalizedRowCount = clampBuilderCount(rowCount, 5);

				return {
					title: "Mit Jeopardy Spil",
					id: "mit-spil",
					teams: ["Team 1", "Team 2", "Team 3"],
					categoryCount: normalizedCategoryCount,
					rowCount: normalizedRowCount,
					boardCreated: false,
					categories: Array.from(
						{ length: normalizedCategoryCount },
						(_, categoryIndex) =>
							createDefaultBuilderCategory(categoryIndex + 1, normalizedRowCount)
					),
				};
			}

			function getBuilderTextValue(source, fields) {
				for (const field of fields) {
					if (typeof source[field] === "string" && source[field].trim()) {
						return source[field].trim();
					}
				}

				return "";
			}

			function normalizeBuilderQuestion(question, index) {
				const source = question && typeof question === "object" ? question : {};
				const questionType = source.markdown
					? "markdown"
					: source.html
					? "html"
					: source.questionType || "question";
				const answerType = source.answerMarkdown
					? "answerMarkdown"
					: source.answerHtml
					? "answerHtml"
					: source.answerType || "answer";

				return {
					points: Number(source.points) || (index + 1) * 100,
					questionType:
						questionType === "markdown" || questionType === "html"
							? questionType
							: "question",
					question: getBuilderTextValue(source, [
						"question",
						"markdown",
						"html",
					]),
					answerType:
						answerType === "answerMarkdown" || answerType === "answerHtml"
							? answerType
							: "answer",
					answer: getBuilderTextValue(source, [
						"answer",
						"answerMarkdown",
						"answerHtml",
					]),
					hints: Array.isArray(source.hints)
						? source.hints
								.map((hint) =>
									typeof hint === "object" ? hint.text || hint.html || "" : hint
								)
								.join("\n")
						: String(source.hints || ""),
					notes: String(source.notes || source.notesHtml || ""),
				};
			}

			function normalizeBuilderCategories(categoriesSource, categoryCount, rowCount) {
				return Array.from({ length: categoryCount }, (_, categoryIndex) => {
					const sourceCategory =
						Array.isArray(categoriesSource) && categoriesSource[categoryIndex]
							? categoriesSource[categoryIndex]
							: {};
					const sourceQuestions = Array.isArray(sourceCategory.questions)
						? sourceCategory.questions
						: [];

					return {
						title: String(
							sourceCategory.title || "Kategori " + (categoryIndex + 1)
						),
						questions: Array.from({ length: rowCount }, (_, questionIndex) =>
							normalizeBuilderQuestion(
								sourceQuestions[questionIndex] ||
									createDefaultBuilderQuestion((questionIndex + 1) * 100),
								questionIndex
							)
						),
					};
				});
			}

			function normalizeBuilderDraft(draft) {
				const source = draft && typeof draft === "object" ? draft : {};
				const categoriesSource = Array.isArray(source.categories)
					? source.categories
					: [];
				const categoryCount = clampBuilderCount(
					source.categoryCount || categoriesSource.length,
					3
				);
				const maxQuestionCount = categoriesSource.reduce(
					(maxCount, category) =>
						Math.max(
							maxCount,
							Array.isArray(category.questions) ? category.questions.length : 0
						),
					0
				);
				const rowCount = clampBuilderCount(source.rowCount || maxQuestionCount, 5);

				return {
					title: String(source.title || "Mit Jeopardy Spil"),
					id: slugifyGameId(source.id || source.title || "mit-spil"),
					teams:
						Array.isArray(source.teams) && source.teams.length
							? source.teams.map((team, index) =>
									String(team || "Team " + (index + 1))
							  )
							: ["Team 1", "Team 2", "Team 3"],
					categoryCount,
					rowCount,
					boardCreated: Boolean(
						source.boardCreated ||
							(source.boardCreated === undefined &&
								categoriesSource.length &&
								!source.categoryCount)
					),
					categories: normalizeBuilderCategories(
						categoriesSource,
						categoryCount,
						rowCount
					),
				};
			}

			function slugifyGameId(value) {
				const slug = String(value || "")
					.toLowerCase()
					.normalize("NFD")
					.replace(/[\u0300-\u036f]/g, "")
					.replace(/[^a-z0-9]+/g, "-")
					.replace(/^-+|-+$/g, "");

				return slug || "mit-spil";
			}

			function loadBuilderDraft() {
				try {
					const savedDraft = localStorage.getItem(GAME_BUILDER_STORAGE_KEY);

					if (savedDraft) {
						return normalizeBuilderDraft(JSON.parse(savedDraft));
					}
				} catch (error) {
					console.warn("Could not load builder draft.", error);
				}

				return createDefaultBuilderDraft();
			}

			function persistBuilderDraft(showStatus) {
				try {
					localStorage.setItem(
						GAME_BUILDER_STORAGE_KEY,
						JSON.stringify(gameBuilderDraft)
					);

					if (showStatus) {
						setBuilderStatus("Kladde gemt.");
					}
				} catch (error) {
					console.warn("Could not save builder draft.", error);
					setBuilderStatus("Kladde kunne ikke gemmes i browseren.");
				}
			}

			function setBuilderStatus(message) {
				const status = document.getElementById("builder-status");

				if (status) {
					status.textContent = message || "";
				}
			}

			function toggleQuestionMaker(forceOpen) {
				const maker = document.getElementById("question-maker");
				const toggle = document.getElementById("question-maker-toggle");

				if (!maker) {
					return;
				}

				const shouldOpen =
					typeof forceOpen === "boolean" ? forceOpen : maker.hidden;

				maker.hidden = !shouldOpen;

				if (toggle) {
					toggle.setAttribute("aria-expanded", String(shouldOpen));
				}

				if (shouldOpen) {
					maker.scrollTop = 0;
				}

				if (typeof Reveal !== "undefined" && Reveal.layout) {
					Reveal.layout();
				}
			}

			function initializeGameBuilder() {
				const maker = document.getElementById("question-maker");
				const title = document.getElementById("builder-title");
				const id = document.getElementById("builder-id");
				const teamsField = document.getElementById("builder-teams");
				const toggle = document.getElementById("question-maker-toggle");

				if (!maker || !title || !id || !teamsField) {
					return;
				}

				if (maker.parentElement !== document.body) {
					document.body.appendChild(maker);
				}

				["click", "keydown", "keyup", "keypress", "wheel", "touchmove"].forEach(
					(eventName) => {
						maker.addEventListener(eventName, (event) => {
							event.stopPropagation();
						});
					}
				);

				gameBuilderDraft = loadBuilderDraft();
				renderBuilderDraft();

				title.oninput = handleBuilderFormInput;
				id.oninput = handleBuilderFormInput;
				teamsField.oninput = handleBuilderFormInput;
				[
					"builder-category-count",
					"builder-row-count",
					"builder-question-points",
					"builder-question-type",
					"builder-question-text",
					"builder-answer-type",
					"builder-answer-text",
					"builder-hints-text",
					"builder-notes-text",
				].forEach((fieldId) => {
					const field = document.getElementById(fieldId);

					if (field) {
						field.oninput = handleBuilderFormInput;
						field.onchange = handleBuilderFormInput;
					}
				});

				if (toggle) {
					toggle.setAttribute("aria-controls", "question-maker");
					toggle.setAttribute("aria-expanded", "false");
				}
			}

			function renderBuilderDraft() {
				const draft = normalizeBuilderDraft(gameBuilderDraft);
				const title = document.getElementById("builder-title");
				const id = document.getElementById("builder-id");
				const teamsField = document.getElementById("builder-teams");
				const categoryCount = document.getElementById("builder-category-count");
				const rowCount = document.getElementById("builder-row-count");
				const setupStage = document.getElementById("builder-setup");
				const boardStage = document.getElementById("builder-board-stage");

				gameBuilderDraft = draft;
				clampBuilderSelection();

				if (!title || !id || !teamsField || !categoryCount || !rowCount) {
					return;
				}

				title.value = draft.title;
				id.value = draft.id;
				teamsField.value = draft.teams.join("\n");
				categoryCount.value = draft.categoryCount;
				rowCount.value = draft.rowCount;

				if (setupStage) {
					setupStage.hidden = draft.boardCreated;
				}

				if (boardStage) {
					boardStage.hidden = !draft.boardCreated;
				}

				renderBuilderBoard();
				renderSelectedBuilderQuestion();
				updateBuilderOutput();
			}

			function clampBuilderSelection() {
				if (!gameBuilderDraft) {
					builderSelectedCategoryIndex = 0;
					builderSelectedQuestionIndex = 0;
					return;
				}

				builderSelectedCategoryIndex = Math.min(
					Math.max(builderSelectedCategoryIndex, 0),
					Math.max(gameBuilderDraft.categoryCount - 1, 0)
				);
				builderSelectedQuestionIndex = Math.min(
					Math.max(builderSelectedQuestionIndex, 0),
					Math.max(gameBuilderDraft.rowCount - 1, 0)
				);
			}

			function renderBuilderBoard() {
				const board = document.getElementById("builder-board");

				if (!board || !gameBuilderDraft || !gameBuilderDraft.boardCreated) {
					return;
				}

				board.innerHTML = "";
				board.style.gridTemplateColumns =
					"repeat(" + gameBuilderDraft.categoryCount + ", minmax(120px, 1fr))";

				gameBuilderDraft.categories.forEach((category, categoryIndex) => {
					const categoryInput = document.createElement("input");

					categoryInput.type = "text";
					categoryInput.className = "builder-category-title";
					categoryInput.value = category.title;
					categoryInput.setAttribute(
						"aria-label",
						"Kategori " + (categoryIndex + 1)
					);
					categoryInput.oninput = () => {
						gameBuilderDraft.categories[categoryIndex].title =
							categoryInput.value || "Kategori " + (categoryIndex + 1);
						persistBuilderDraft(false);
						updateBuilderOutput();
						renderSelectedBuilderQuestionTitle();
					};
					board.appendChild(categoryInput);
				});

				for (
					let questionIndex = 0;
					questionIndex < gameBuilderDraft.rowCount;
					questionIndex += 1
				) {
					gameBuilderDraft.categories.forEach((category, categoryIndex) => {
						const question = category.questions[questionIndex];
						const tile = document.createElement("button");
						const title = document.createElement("span");
						const isActive =
							categoryIndex === builderSelectedCategoryIndex &&
							questionIndex === builderSelectedQuestionIndex;

						tile.type = "button";
						tile.className =
							"builder-tile" +
							(isActive ? " active" : "") +
							(question.question && question.answer ? " complete" : "");
						tile.textContent = question.points;
						title.textContent = question.question
							? question.question.slice(0, 36)
							: "Tomt";
						tile.setAttribute(
							"aria-label",
							category.title + " for " + question.points + " point"
						);
						tile.onclick = () =>
							selectBuilderQuestion(categoryIndex, questionIndex);
						tile.appendChild(title);
						board.appendChild(tile);
					});
				}
			}

			function renderSelectedBuilderQuestionTitle() {
				const heading = document.getElementById("builder-editor-title");
				const category =
					gameBuilderDraft &&
					gameBuilderDraft.categories[builderSelectedCategoryIndex];
				const question =
					category && category.questions[builderSelectedQuestionIndex];

				if (heading && category && question) {
					heading.textContent =
						category.title + " - " + question.points + " point";
				}
			}

			function renderSelectedBuilderQuestion() {
				const editor = document.getElementById("builder-editor");
				const category =
					gameBuilderDraft &&
					gameBuilderDraft.categories[builderSelectedCategoryIndex];
				const question =
					category && category.questions[builderSelectedQuestionIndex];

				if (!editor) {
					return;
				}

				if (!gameBuilderDraft || !gameBuilderDraft.boardCreated || !question) {
					editor.hidden = true;
					return;
				}

				editor.hidden = false;
				renderSelectedBuilderQuestionTitle();
				setBuilderFieldValue("builder-question-points", question.points);
				setBuilderFieldValue("builder-question-type", question.questionType);
				setBuilderFieldValue("builder-question-text", question.question);
				setBuilderFieldValue("builder-answer-type", question.answerType);
				setBuilderFieldValue("builder-answer-text", question.answer);
				setBuilderFieldValue("builder-hints-text", question.hints);
				setBuilderFieldValue("builder-notes-text", question.notes);
			}

			function setBuilderFieldValue(fieldId, value) {
				const field = document.getElementById(fieldId);

				if (field) {
					field.value = value === undefined || value === null ? "" : value;
				}
			}

			function buildQuestionMakerBoard() {
				gameBuilderDraft = readBuilderDraftFromForm();
				gameBuilderDraft.boardCreated = true;
				gameBuilderDraft.categories = normalizeBuilderCategories(
					gameBuilderDraft.categories,
					gameBuilderDraft.categoryCount,
					gameBuilderDraft.rowCount
				);
				builderSelectedCategoryIndex = 0;
				builderSelectedQuestionIndex = 0;
				persistBuilderDraft(false);
				renderBuilderDraft();
				setBuilderStatus("Boardet er klar. Tryk på en celle for at udfylde den.");
				toggleQuestionMaker(true);
			}

			function editQuestionMakerSetup() {
				gameBuilderDraft = readBuilderDraftFromForm();
				gameBuilderDraft.boardCreated = false;
				persistBuilderDraft(false);
				renderBuilderDraft();
				setBuilderStatus("Ret antal kategorier eller rækker og tryk Lav board igen.");
				toggleQuestionMaker(true);
			}

			function readBuilderDraftFromForm() {

					categoryCount: clampBuilderCount(categoryCount ? categoryCount.value : 3, 3),

			function getQuestionBuilderValue(question, fields) {
				for (const field of fields) {
					if (typeof question[field] === "string" && question[field].trim()) {
						return question[field].trim();
					}
				}

				return "";

			function loadCurrentGameIntoBuilder() {
				gameBuilderDraft = normalizeBuilderDraft({
					title: gameConfig.title,
					id: gameConfig.id,
					teams: teams.map((team) => team.name),
					categoryCount: categories.length,
					rowCount: getQuestionRowCount(),
					boardCreated: true,
					categories: categories.map((category) => ({

						questions: category.questions.map((question) => ({
							points: question.points,
							...question,
						})),

				});

			function buildGameFromBuilderDraft(draft) {
				const normalizedDraft = normalizeBuilderDraft(draft);

				return {
					id: slugifyGameId(normalizedDraft.id || normalizedDraft.title),
					title: normalizedDraft.title,
					teams: normalizedDraft.teams,
					categories: normalizedDraft.categories.map((category) => ({
						title: category.title,
						questions: category.questions.map((question, index) => {
							const hints = String(question.hints || "")
								.split(/\r?\n/)
								.map((hint) => hint.trim())
								.filter(Boolean);
							const outputQuestion = {
								points: Number(question.points) || (index + 1) * 100,
							};
							const questionField = question.questionType || "question";
							const answerField = question.answerType || "answer";

							outputQuestion[questionField] = question.question;
							outputQuestion[answerField] = question.answer;

							if (hints.length) {
								outputQuestion.hints = hints;
							}

							if (question.notes) {
								outputQuestion.notes = question.notes;
							}

							return outputQuestion;
						}),
					})),
				};
			}

			function serializeBuilderGame(draft) {
				return (
					"window.JEOPARDY_GAME = " +
					JSON.stringify(buildGameFromBuilderDraft(draft), null, "\t") +
					";\n"
				);
			}

			function getBuilderFileName() {
				return slugifyGameId(gameBuilderDraft.id || gameBuilderDraft.title) + ".js";
			}

			function updateBuilderOutput() {
				const output = document.getElementById("builder-output");

				if (output && gameBuilderDraft) {
					output.value = serializeBuilderGame(gameBuilderDraft);
				}
			}

			async function saveBuilderFile() {
				gameBuilderDraft = readBuilderDraftFromForm();
				persistBuilderDraft(false);

				const fileName = getBuilderFileName();
				const content = serializeBuilderGame(gameBuilderDraft);

				try {
					if (window.showSaveFilePicker) {
						const handle = await window.showSaveFilePicker({
							suggestedName: fileName,
							types: [
								{
									description: "JavaScript game file",
									accept: {
										"text/javascript": [".js"],
									},
								},
							],
						});
						const writable = await handle.createWritable();

						await writable.write(content);
						await writable.close();
					} else {
						const blob = new Blob([content], {
							type: "text/javascript;charset=utf-8",
						});
						const url = URL.createObjectURL(blob);
						const link = document.createElement("a");

						link.href = url;
						link.download = fileName;
						document.body.appendChild(link);
						link.click();
						link.remove();
						URL.revokeObjectURL(url);
					}

					setBuilderStatus(
						"Gemt som " +
							fileName +
							". Laeg filen i games/ og tilfoej den til GAME_FILES."
					);
				} catch (error) {
					if (error && error.name === "AbortError") {
						setBuilderStatus("Gem blev annulleret.");
						return;
					}

					console.warn("Could not save game file.", error);
					setBuilderStatus("Filen kunne ikke gemmes.");
				}

				updateBuilderOutput();
			}

			async function copyBuilderRegistration() {
				gameBuilderDraft = readBuilderDraftFromForm();
				persistBuilderDraft(false);

				const fileName = getBuilderFileName();
				const key = fileName.replace(/\.js$/i, "");
				const registration = '\t"' + key + '": "games/' + fileName + '",';

				try {
					await navigator.clipboard.writeText(registration);
					setBuilderStatus("GAME_FILES-linje kopieret: " + registration.trim());
				} catch (error) {
					console.warn("Could not copy game registration.", error);
					setBuilderStatus(registration.trim());
				}
			}

			function getSlideIdFromHash(targetHash) {
				return String(targetHash || "/home").replace(/^#?\//, "") || "home";
			}

			function refreshGameFromSettings(targetHash) {
				window.location.hash = "/" + getSlideIdFromHash(targetHash);
				window.location.reload();
			}

			function getGameUrl(key) {
				const url = new URL(window.location.href);

				url.searchParams.set("game", key);
				url.hash = "/home";

				return url.toString();
			}

			function changeGame(key) {
				if (!GAME_FILES[key] || key === gameKey) {
					return;
				}

				window.location.href = getGameUrl(key);
			}

			function normalizeGameConfig(rawGame) {
				const source = rawGame && typeof rawGame === "object" ? rawGame : {};
				const normalizedTeams =
					Array.isArray(source.teams) && source.teams.length
						? source.teams
						: ["Team 1", "Team 2", "Team 3"];
				defaultTeamNames = normalizedTeams.map((team, index) =>
					String(team || "Team " + (index + 1))
				);
				const configuredTeamNames = getConfiguredTeamNames(normalizedTeams);
				const normalizedCategories =
					Array.isArray(source.categories) && source.categories.length
						? source.categories
						: [];

				return {
					id: source.id || gameKey,
					title: source.title || "Jeopardy",
					teams: configuredTeamNames.map((team, index) => ({
						id: "team" + (index + 1),
						name: String(team || "Team " + (index + 1)),
					})),
					categories: normalizedCategories.map((category, categoryIndex) => ({
						title: String(category.title || "Category " + (categoryIndex + 1)),
						questions: normalizeQuestions(category.questions),
					})),
				};
			}

			function normalizeQuestions(questions) {
				const sourceQuestions = Array.isArray(questions) ? questions : [];

				return sourceQuestions.map((question, index) => {
					const fallbackPoints = (index + 1) * 100;

					return {
						...question,
						points: Number(question.points) || fallbackPoints,
						question:
							(question.question || question.html || question.markdown)
								? question.question || ""
								: "Question goes here.",
						answer:
							(question.answer || question.answerHtml || question.answerMarkdown)
								? question.answer || ""
								: "Answer goes here.",
					};
				});
			}

			function applySlideOptions(slide, question) {
				const slideAttributes = {
					...(question.slideAttributes || {}),
				};

				if (question.background) {
					slideAttributes["data-background"] = question.background;
				}

				if (question.backgroundColor) {
					slideAttributes["data-background-color"] = question.backgroundColor;
				}

				if (question.backgroundVideo) {
					slideAttributes["data-background-video"] = question.backgroundVideo;
				}

				if (question.backgroundVideo && question.backgroundVideoLoop !== false) {
					slideAttributes["data-background-video-loop"] = "";
				}

				if (question.backgroundVideo && question.backgroundVideoMuted !== false) {
					slideAttributes["data-background-video-muted"] = "";
				}

				if (question.backgroundIframe) {
					slideAttributes["data-background-iframe"] = question.backgroundIframe;
				}

				if (question.backgroundInteractive) {
					slideAttributes["data-background-interactive"] = "";
				}

				if (question.transition) {
					slideAttributes["data-transition"] = question.transition;
				}

				if (question.autoAnimate) {
					slideAttributes["data-auto-animate"] = "";
				}

				Object.entries(slideAttributes).forEach(([name, value]) => {
					slide.setAttribute(name, value === true ? "" : String(value));
				});

				if (question.className) {
					slide.classList.add(...String(question.className).split(/\s+/));
				}
			}

			function renderContent(container, question, kind) {
				const isAnswer = kind === "answer";
				const markdown = isAnswer ? question.answerMarkdown : question.markdown;
				const html = isAnswer ? question.answerHtml : question.html;
				const fallback = isAnswer ? question.answer : question.question;

				container.innerHTML = "";

				if (markdown) {
					const markdownElement = document.createElement("div");
					const template = document.createElement("script");

					markdownElement.setAttribute("data-markdown", "");
					markdownElement.setAttribute("data-separator", "$x");
					template.type = "text/template";
					template.textContent = markdown;
					markdownElement.appendChild(template);
					container.appendChild(markdownElement);
					return;
				}

				if (html) {
					container.innerHTML = html;
					return;
				}

				container.textContent = fallback || "";
			}

			function renderHints(container, question) {
				if (!Array.isArray(question.hints) || question.hints.length === 0) {
					return;
				}

				const hints = document.createElement("div");
				const hintCue = document.createElement("div");

				hints.className = "question-hints";
				hintCue.className = "hint-cue";
				hintCue.textContent = "Højre/ned giver hints. Venstre/op går til boardet.";
				hints.appendChild(hintCue);

				question.hints.forEach((hint, index) => {
					const hintElement = document.createElement("p");
					const hintConfig =
						hint && typeof hint === "object" ? hint : { text: hint };

					hintElement.className = "fragment";
					hintElement.dataset.fragmentIndex = String(index);

					if (hintConfig.html) {
						hintElement.innerHTML = hintConfig.html;
					} else {
						hintElement.textContent = hintConfig.text || "";
					}

					hints.appendChild(hintElement);
				});

				container.appendChild(hints);
			}

			function initializeGameData() {
				gameConfig = normalizeGameConfig(window.JEOPARDY_GAME);
				categories = gameConfig.categories;
				teams = gameConfig.teams;
				teamIds = teams.map((team) => team.id);
				questionIdSet = new Set();
				resetRuntimeGameState();

				document.documentElement.style.setProperty(
					"--category-count",
					Math.max(categories.length, 1)
				);
				document.documentElement.style.setProperty(
					"--question-count",
					Math.max(getQuestionRowCount(), 1)
				);
				document.documentElement.style.setProperty(
					"--team-count",
					Math.max(teamIds.length, 1)
				);
			}

			function getQuestionRowCount() {
				return categories.reduce(
					(maxCount, category) => Math.max(maxCount, category.questions.length),
					0
				);
			}

			function getQuestionId(categoryIndex, points) {
				return "c" + categoryIndex + "q" + points;
			}

			function isQuestionId(questionId) {
				return questionIdSet.has(questionId || "");
			}

			function resetRuntimeGameState() {
				scores = {};
				usedQuestions = [];
				questionAwards = {};

				teamIds.forEach((teamId) => {
					scores[teamId] = 0;
				});
			}

			function removeQuestionAward(questionId) {
				const award = questionAwards[questionId];

				if (!award || !teamIds.includes(award.team)) {
					delete questionAwards[questionId];
					return;
				}

				const amount = Number(award.amount);

				if (!Number.isNaN(amount)) {
					scores[award.team] = (scores[award.team] || 0) - amount;
					updateScoreboard();
				}

				delete questionAwards[questionId];
			}

			function prepareQuestionForCorrection(questionId) {
				if (!isQuestionId(questionId) || !usedQuestions.includes(questionId)) {
					return;
				}

				removeQuestionAward(questionId);
				usedQuestions = usedQuestions.filter((usedId) => usedId !== questionId);
				setTileAvailable(questionId);
				saveGameState();
			}

			function getTotalQuestionCount() {
				return categories.reduce(
					(total, category) => total + category.questions.length,
					0
				);
			}

			function renderTeamFields(teamNames) {
				const teamFieldList = document.getElementById("team-field-list");
				const teamCountInput = document.getElementById("team-count");

				if (!teamFieldList || !teamCountInput) {
					return;
				}

				const teamCount = clampTeamCount(teamCountInput.value || teamNames.length);

				teamFieldList.innerHTML = "";

				Array.from({ length: teamCount }, (_, index) => {
					const wrapper = document.createElement("div");
					const label = document.createElement("label");
					const input = document.createElement("input");
					const existingName = teamNames[index] || defaultTeamNames[index];

					label.setAttribute("for", "team-name-" + (index + 1));
					label.textContent = "Team " + (index + 1) + " navn";
					input.id = "team-name-" + (index + 1);
					input.type = "text";
					input.value = existingName || "Team " + (index + 1);
					input.autocomplete = "off";

					wrapper.appendChild(label);
					wrapper.appendChild(input);
					teamFieldList.appendChild(wrapper);
				});
			}

			function renderHome() {
				const gameSelect = document.getElementById("game-select");
				const gameList = document.getElementById("game-list");
				const gameMeta = document.getElementById("game-meta");
				const teamCountInput = document.getElementById("team-count");

				if (!gameSelect || !gameList || !gameMeta || !teamCountInput) {
					return;
				}

				gameSelect.innerHTML = "";
				gameList.innerHTML = "";
				gameMeta.innerHTML = "";

				Object.entries(GAME_FILES).forEach(([key, path]) => {
					const option = document.createElement("option");
					const link = document.createElement("a");
					const title = document.createElement("strong");
					const file = document.createElement("span");

					option.value = key;
					option.textContent = key + " - " + path;
					option.selected = key === gameKey;
					gameSelect.appendChild(option);

					link.className = "game-card" + (key === gameKey ? " active" : "");
					link.href = getGameUrl(key);
					title.textContent = key;
					file.textContent = path;
					link.appendChild(title);
					link.appendChild(file);
					gameList.appendChild(link);
				});

				gameSelect.value = gameKey;
				gameSelect.onchange = () => changeGame(gameSelect.value);

				const currentFile = document.createElement("div");
				const categoryCount = document.createElement("div");
				const questionCount = document.createElement("div");
				const categoryNames = document.createElement("div");

				currentFile.textContent = "Valgt fil: " + GAME_FILES[gameKey];
				categoryCount.textContent = "Kategorier: " + categories.length;
				questionCount.textContent = "Spørgsmål: " + getTotalQuestionCount();
				categoryNames.textContent =
					"Kategorier: " +
					categories.map((category) => category.title).join(", ");
				gameMeta.appendChild(currentFile);
				gameMeta.appendChild(categoryCount);
				gameMeta.appendChild(questionCount);
				gameMeta.appendChild(categoryNames);

				teamCountInput.value = teams.length || defaultTeamNames.length || 3;
				teamCountInput.onchange = () => {
					renderTeamFields(getTeamNamesFromForm());
				};
				teamCountInput.oninput = () => {
					renderTeamFields(getTeamNamesFromForm());
				};

				renderTeamFields(teams.map((team) => team.name));
			}

			function renderGame() {
				const title = document.getElementById("game-title");
				const gameName = document.getElementById("game-name");
				const scoreboard = document.getElementById("scoreboard");
				const categoryRow = document.getElementById("category-row");
				const board = document.getElementById("jeopardy-board");
				const slides = document.getElementById("slides");

				if (!scoreboard || !categoryRow || !board || !slides) {
					return;
				}

				if (title) {
					title.textContent = gameConfig.title;
				}

				if (gameName) {
					gameName.textContent = "Game file: " + GAME_FILES[gameKey];
				}

				scoreboard.innerHTML = "";
				categoryRow.innerHTML = "";
				board.innerHTML = "";

				slides.querySelectorAll(".question-slide").forEach((slide) => {
					slide.remove();
				});

				teams.forEach((team) => {
					const scoreCard = document.createElement("div");
					const teamName = document.createElement("strong");
					const score = document.createElement("span");

					scoreCard.className = "score-card";
					teamName.textContent = team.name;
					score.id = "score-" + team.id;
					score.textContent = "0";
					scoreCard.appendChild(teamName);
					scoreCard.appendChild(score);
					scoreboard.appendChild(scoreCard);
				});

				categories.forEach((category) => {
					const categoryCell = document.createElement("div");

					categoryCell.className = "category";
					categoryCell.textContent = category.title;
					categoryRow.appendChild(categoryCell);
				});

				for (let questionIndex = 0; questionIndex < getQuestionRowCount(); questionIndex += 1) {
					categories.forEach((category, categoryIndex) => {
						const question = category.questions[questionIndex];

						if (!question) {
							const emptyTile = document.createElement("div");

							emptyTile.className = "points used";
							board.appendChild(emptyTile);
							return;
						}

						const displayCategoryIndex = categoryIndex + 1;
						const questionId = getQuestionId(displayCategoryIndex, question.points);
						const tile = document.createElement("div");
						const link = document.createElement("a");

						questionIdSet.add(questionId);
						tile.className = "points";
						tile.id = "tile-" + questionId;
						tile.dataset.category = category.title;
						tile.dataset.points = question.points;
						link.href = "#/" + questionId;
						link.textContent = question.points;
						link.setAttribute(
							"aria-label",
							category.title + " for " + question.points + " points"
						);
						link.addEventListener("click", () => {
							prepareQuestionForCorrection(questionId);
						});

						tile.appendChild(link);
						board.appendChild(tile);
					});
				}

				categories.forEach((category, categoryIndex) => {
					category.questions.forEach((question) => {
						const displayCategoryIndex = categoryIndex + 1;
						const questionId = getQuestionId(displayCategoryIndex, question.points);
						const slide = document.createElement("section");
						const heading = document.createElement("h2");
						const questionLayout = document.createElement("div");
						const questionMain = document.createElement("div");
						const questionSidebar = document.createElement("div");
						const pointBadge = document.createElement("div");
						const questionText = document.createElement("div");
						const answer = document.createElement("div");
						const questionActions = document.createElement("div");
						const showAnswerButton = document.createElement("button");
						const scoreControls = document.createElement("div");

						slide.id = questionId;
						slide.className = "question-slide";
						slide.dataset.points = question.points;
						slide.dataset.category = category.title;
						applySlideOptions(slide, question);
						heading.textContent = category.title;
						questionLayout.className = "question-layout";
						questionMain.className = "question-main";
						questionSidebar.className = "question-sidebar";
						pointBadge.className = "question-points";
						pointBadge.textContent = question.points;
						questionText.className = "question-text";
						answer.className = "answer";
						renderContent(questionText, question, "question");
						renderHints(questionText, question);
						renderContent(answer, question, "answer");
						questionActions.className = "question-actions";
						showAnswerButton.className = "game-button primary";
						showAnswerButton.type = "button";
						showAnswerButton.textContent = "Show answer";
						showAnswerButton.onclick = showAnswer;
						scoreControls.className = "score-controls";
						scoreControls.setAttribute("aria-label", "Score controls");

						questionActions.appendChild(showAnswerButton);
						teams.forEach((team) => {
							const row = document.createElement("div");
							const label = document.createElement("strong");
							const correctButton = document.createElement("button");
							const wrongButton = document.createElement("button");

							row.className = "team-score-row";
							label.textContent = team.name;
							correctButton.className = "game-button correct";
							correctButton.type = "button";
							correctButton.textContent = "+";
							correctButton.setAttribute(
								"aria-label",
								team.name + " correct, plus " + question.points
							);
							correctButton.onclick = () => changeScore(team.id, question.points);
							wrongButton.className = "game-button wrong";
							wrongButton.type = "button";
							wrongButton.textContent = "-";
							wrongButton.setAttribute(
								"aria-label",
								team.name + " wrong, minus " + question.points
							);
							wrongButton.onclick = () => changeScore(team.id, -question.points);

							row.appendChild(label);
							row.appendChild(correctButton);
							row.appendChild(wrongButton);
							scoreControls.appendChild(row);
						});

						slide.appendChild(heading);
						questionMain.appendChild(questionText);
						questionMain.appendChild(questionActions);
						questionMain.appendChild(answer);
						questionSidebar.appendChild(pointBadge);
						questionSidebar.appendChild(scoreControls);
						questionLayout.appendChild(questionMain);
						questionLayout.appendChild(questionSidebar);
						slide.appendChild(questionLayout);

						if (question.notes || question.notesHtml) {
							const notes = document.createElement("aside");

							notes.className = "notes";
							if (question.notesHtml) {
								notes.innerHTML = question.notesHtml;
							} else {
								notes.textContent = question.notes;
							}
							slide.appendChild(notes);
						}

						slides.appendChild(slide);
					});
				});
			}

			function updateScoreboard() {
				teamIds.forEach((teamId) => {
					const scoreElement = document.getElementById("score-" + teamId);

					if (scoreElement) {
						scoreElement.textContent = scores[teamId] || 0;
					}
				});
			}

			function setTileAvailable(questionId) {
				const tile = document.getElementById("tile-" + questionId);

				if (!tile) {
					return;
				}

				const link = tile.querySelector("a");

				tile.classList.remove("used");
				tile.removeAttribute("aria-disabled");

				if (link) {
					link.textContent = tile.dataset.points || "";
					link.removeAttribute("tabindex");
					link.setAttribute(
						"aria-label",
						(tile.dataset.category || "Question") +
							" for " +
							(tile.dataset.points || "") +
							" points"
					);
				}
			}

			function setTileUsed(questionId) {
				const tile = document.getElementById("tile-" + questionId);

				if (!tile) {
					return;
				}

				const link = tile.querySelector("a");

				tile.classList.add("used");

				if (link) {
					link.textContent = "Taget";
					link.removeAttribute("tabindex");
					link.setAttribute("aria-label", "Taget sporgsmaal. Klik for at rette.");
				}
			}

			function updateUsedTiles() {
				document.querySelectorAll(".points").forEach((tile) => {
					if (tile.id && tile.id.startsWith("tile-")) {
						setTileAvailable(tile.id.replace("tile-", ""));
					}
				});

				usedQuestions.forEach((questionId) => {
					setTileUsed(questionId);
				});
			}

			function showAnswer() {
				const currentSlide = getCurrentQuestionSlide();

				if (!currentSlide) {
					return;
				}

				revealAnswerForQuestion(currentSlide.id);
				broadcastGameMessage("answer-shown", {
					questionId: currentSlide.id,
				});
			}

			function revealAnswerForQuestion(questionId) {
				const slide = document.getElementById(questionId);

				if (!slide || !isQuestionId(questionId)) {
					return;
				}

				const answer = slide.querySelector(".answer");

				if (!answer) {
					return;
				}

				answer.classList.add("visible");

				if (
					typeof Reveal !== "undefined" &&
					Reveal.layout &&
					getCurrentQuestionSlide() === slide
				) {
					Reveal.layout();
				}
			}

			function clearVisibleAnswers() {
				document.querySelectorAll(".answer.visible").forEach((answer) => {
					answer.classList.remove("visible");
				});
			}

			function getCurrentQuestionSlide() {
				if (typeof Reveal !== "undefined" && Reveal.getCurrentSlide) {
					return Reveal.getCurrentSlide();
				}

				return document.querySelector(".question-slide.present");
			}

			function isCurrentQuestionSlide() {
				const currentSlide = getCurrentQuestionSlide();

				return (
					currentSlide &&
					currentSlide.classList &&
					currentSlide.classList.contains("question-slide") &&
					isQuestionId(currentSlide.id)
				);
			}

			function getKeyboardKey(event) {
				return event.key || KEY_CODE_TO_KEY[event.keyCode] || "";
			}

			function stopKeyboardEvent(event) {
				if (event.preventDefault) {
					event.preventDefault();
				}

				if (event.stopPropagation) {
					event.stopPropagation();
				}

				if (event.stopImmediatePropagation) {
					event.stopImmediatePropagation();
				}
			}

			function handleQuestionNavigationKey(event) {
				const key = getKeyboardKey(event);

				if (
					!isCurrentQuestionSlide() ||
					event.altKey ||
					event.ctrlKey ||
					event.metaKey
				) {
					return false;
				}

				if (
					key !== "ArrowLeft" &&
					key !== "ArrowRight" &&
					key !== "ArrowUp" &&
					key !== "ArrowDown"
				) {
					return false;
				}

				stopKeyboardEvent(event);

				if (key === "ArrowLeft" || key === "ArrowUp") {
					allowQuestionBoardNavigation = true;
					goToBoard();
					return true;
				}

				if (typeof Reveal !== "undefined" && Reveal.nextFragment) {
					Reveal.nextFragment();
				}

				return true;
			}

			function handleQuestionArrowKeys(event) {
				handleQuestionNavigationKey(event);
			}

			function handleRevealArrowKey(keyCode, event) {
				if (handleQuestionNavigationKey(event || { keyCode })) {
					return;
				}

				if (typeof Reveal === "undefined") {
					return;
				}

				const config = Reveal.getConfig ? Reveal.getConfig() : {};
				const skipFragments = Boolean(event && event.altKey);
				const shiftKey = Boolean(event && event.shiftKey);
				const overviewActive =
					Reveal.overview && Reveal.overview.isActive
						? Reveal.overview.isActive()
						: false;
				const useLinearMode =
					config.navigationMode === "linear" ||
					!Reveal.hasHorizontalSlides ||
					!Reveal.hasVerticalSlides ||
					!Reveal.hasHorizontalSlides() ||
					!Reveal.hasVerticalSlides();

				if (keyCode === 37) {
					if (shiftKey && Reveal.slide) {
						Reveal.slide(0);
					} else if (!overviewActive && useLinearMode) {
						(config.rtl ? Reveal.next : Reveal.prev)({ skipFragments });
					} else if (Reveal.left) {
						Reveal.left({ skipFragments });
					}
				} else if (keyCode === 38) {
					if (shiftKey && Reveal.slide) {
						Reveal.slide(undefined, 0);
					} else if (!overviewActive && useLinearMode) {
						Reveal.prev({ skipFragments });
					} else if (Reveal.up) {
						Reveal.up({ skipFragments });
					}
				} else if (keyCode === 39) {
					if (shiftKey && Reveal.slide && Reveal.getHorizontalSlides) {
						Reveal.slide(Reveal.getHorizontalSlides().length - 1);
					} else if (!overviewActive && useLinearMode) {
						(config.rtl ? Reveal.prev : Reveal.next)({ skipFragments });
					} else if (Reveal.right) {
						Reveal.right({ skipFragments });
					}
				} else if (keyCode === 40) {
					if (shiftKey && Reveal.slide) {
						Reveal.slide(undefined, Number.MAX_VALUE);
					} else if (!overviewActive && useLinearMode) {
						Reveal.next({ skipFragments });
					} else if (Reveal.down) {
						Reveal.down({ skipFragments });
					}
				}
			}

			function getTopLevelSlideIndex(slideId) {
				const topLevelSlides = Array.from(
					document.querySelectorAll(".reveal .slides > section")
				);

				return topLevelSlides.findIndex((slide) => slide.id === slideId);
			}

			function goToSlideId(slideId) {
				const slideIndex = getTopLevelSlideIndex(slideId);

				if (typeof Reveal !== "undefined" && Reveal.slide && slideIndex >= 0) {
					Reveal.slide(slideIndex);
					return;
				}

				window.location.hash = "/" + slideId;
			}

			function goToHome() {
				goToSlideId("home");
			}

			function goToBoard() {
				goToSlideId("board");
			}

			function markUsedAndGoBack(questionId) {
				if (questionId && !usedQuestions.includes(questionId)) {
					usedQuestions.push(questionId);
				}

				updateUsedTiles();
				saveGameState();

				if (typeof Reveal !== "undefined" && Reveal.slide) {
					goToBoard();
				} else {
					window.location.hash = "/board";
				}
			}

			function changeScore(team, amount) {
				if (!teamIds.includes(team) || Number.isNaN(Number(amount))) {
					return;
				}

				const currentSlide = getCurrentQuestionSlide();
				const questionId =
					currentSlide && currentSlide.id && isQuestionId(currentSlide.id)
						? currentSlide.id
						: "";

				if (questionId) {
					removeQuestionAward(questionId);
					questionAwards[questionId] = {
						team,
						amount: Number(amount),
					};
				}

				scores[team] = (scores[team] || 0) + Number(amount);
				updateScoreboard();

				if (questionId) {
					markUsedAndGoBack(questionId);
					return;
				}

				saveGameState();
			}

			function saveGameState() {
				try {
					localStorage.setItem(
						getStorageKey(),
						JSON.stringify({
							scores,
							usedQuestions,
							questionAwards,
						})
					);
					broadcastGameMessage("state-changed", {
						storageKey: getStorageKey(),
					});
				} catch (error) {
					console.warn("Could not save game state.", error);
				}
			}

			function loadGameState() {
				try {
					const savedState = localStorage.getItem(getStorageKey());

					if (!savedState) {
						resetRuntimeGameState();
						clearVisibleAnswers();
						updateScoreboard();
						updateUsedTiles();
						return;
					}

					const parsedState = JSON.parse(savedState);

					if (parsedState && typeof parsedState === "object") {
						if (parsedState.scores && typeof parsedState.scores === "object") {
							teamIds.forEach((teamId) => {
								scores[teamId] = Number(parsedState.scores[teamId]) || 0;
							});
						}

						if (Array.isArray(parsedState.usedQuestions)) {
							usedQuestions = parsedState.usedQuestions.filter((questionId) =>
								isQuestionId(questionId)
							);
						}

						if (
							parsedState.questionAwards &&
							typeof parsedState.questionAwards === "object"
						) {
							questionAwards = {};

							Object.entries(parsedState.questionAwards).forEach(
								([questionId, award]) => {
									if (
										isQuestionId(questionId) &&
										award &&
										teamIds.includes(award.team) &&
										!Number.isNaN(Number(award.amount))
									) {
										questionAwards[questionId] = {
											team: award.team,
											amount: Number(award.amount),
										};
									}
								}
							);
						}
					}
				} catch (error) {
					console.warn("Could not load game state.", error);
				}

				updateScoreboard();
				updateUsedTiles();
			}

			function resetGame() {
				if (
					!window.confirm(
						"Reset game? Scores and used questions will be cleared."
					)
				) {
					return;
				}

				resetRuntimeGameState();

				try {
					localStorage.removeItem(getStorageKey());
					broadcastGameMessage("state-changed", {
						storageKey: getStorageKey(),
					});
				} catch (error) {
					console.warn("Could not clear game state.", error);
				}

				updateUsedTiles();
				clearVisibleAnswers();

				updateScoreboard();

				if (typeof Reveal !== "undefined" && Reveal.slide) {
					goToBoard();
				} else {
					window.location.hash = "/board";
				}
			}

			function isSameOriginGameMessage(event) {
				return (
					window.location.protocol === "file:" ||
					!event.origin ||
					event.origin === window.location.origin
				);
			}

			function parseGameMessage(data) {
				if (typeof data !== "string" || data.charAt(0) !== "{") {
					return null;
				}

				try {
					return JSON.parse(data);
				} catch (error) {
					return null;
				}
			}

			function getGameMessageTargets() {
				const targets = new Set();

				if (window.parent && window.parent !== window) {
					targets.add(window.parent);
				}

				if (window.opener) {
					targets.add(window.opener);
				}

				if (
					window.top &&
					window.top !== window &&
					window.top.opener
				) {
					targets.add(window.top.opener);
				}

				return targets;
			}

			function broadcastGameMessage(type, payload) {
				const message = JSON.stringify({
					namespace: "reveal-jeopardy",
					type,
					...(payload || {}),
				});

				getGameMessageTargets().forEach((target) => {
					try {
						target.postMessage(message, "*");
					} catch (error) {
						// Ignore closed or cross-origin windows.
					}
				});
			}

			function handleGameMessage(event) {
				if (!isSameOriginGameMessage(event)) {
					return;
				}

				const data = parseGameMessage(event.data);

				if (!data || data.namespace !== "reveal-jeopardy") {
					return;
				}

				if (data.type === "state-changed" && data.storageKey === getStorageKey()) {
					loadGameState();
				}

				if (data.type === "answer-shown") {
					revealAnswerForQuestion(data.questionId);
				}
			}

			function handleStorageChange(event) {
				if (event.key === getStorageKey()) {
					loadGameState();
				}
			}

			function initializeGameSync() {
				window.addEventListener("message", handleGameMessage);
				window.addEventListener("storage", handleStorageChange);
			}

			function initializeReveal() {
				Reveal.initialize({
					hash: true,
					controls: false,
					markdown: {
						smartypants: true,
					},
					mathjax4: {
						tex: {
							inlineMath: [
								["$", "$"],
								["\\(", "\\)"],
							],
							displayMath: [
								["$$", "$$"],
								["\\[", "\\]"],
							],
						},
					},
					plugins: [
						RevealMarkdown,
						RevealHighlight,
						RevealNotes,
						RevealMath.MathJax4,
						RevealSearch,
						RevealZoom,
					],
				});

				[37, 38, 39, 40].forEach((keyCode) => {
					Reveal.addKeyBinding(keyCode, (event) => {
						handleRevealArrowKey(keyCode, event);
					});
				});

				Reveal.on("slidechanged", (event) => {
					if (!event || !event.currentSlide) {
						return;
					}

					const previousQuestionId = event.previousSlide ? event.previousSlide.id : "";
					const canGoBackToBoard = allowQuestionBoardNavigation;

					allowQuestionBoardNavigation = false;

					if (
						event.currentSlide.id === "board" &&
						isQuestionId(previousQuestionId) &&
						!canGoBackToBoard &&
						!usedQuestions.includes(previousQuestionId) &&
						typeof Reveal !== "undefined" &&
						Reveal.getIndices &&
						Reveal.slide
					) {
						const previousIndices = Reveal.getIndices(event.previousSlide);

						if (previousIndices) {
							Reveal.slide(previousIndices.h, previousIndices.v, previousIndices.f);
						}

						return;
					}

					const answer = event.currentSlide.querySelector(".answer.visible");

					if (answer) {
						answer.classList.remove("visible");
					}
				});

				window.addEventListener("keydown", handleQuestionArrowKeys, true);
			}

			loadGameFile().then(() => {
				initializeGameData();
				renderHome();
				initializeGameBuilder();
				renderGame();
				loadGameState();
				initializeGameSync();
				initializeReveal();
			});
		</script>
	</body>
